# ailc.policy.toml: правила проекта или организации.
# Авторит СТАРШИЙ (архитектор или технический руководитель) один раз. Джун наследует
# автоматически, ничего не зная и не настраивая: гейт применяет это сам.
#
# ВАЖНО (T33). Этот файл лежит в рабочем дереве, поэтому его может изменить тот же, чей
# код проверяется. Чтобы вердикт нельзя было подделать ослаблением политики, гейт после
# загрузки сверяет её с организационным дефолтом и выносит ЯВНОЕ предупреждение, если
# политика проекта слабее (порог блокировки выше, семейства обрезаны, веса занижены).
# Для командного и CI-режима задайте доверенный источник вне дерева переменной окружения
# CO_MCP_POLICY (путь к эталонному файлу), либо сверьте контрольную сумму этого файла
# переменной CO_MCP_POLICY_SHA256 (SHA-256 в шестнадцатеричной записи). При несовпадении
# суммы файл считается подменённым и применяется безопасный дефолт.
#
# Настоящий файл намеренно приведён к уровню НЕ СЛАБЕЕ организационного дефолта: блокирует
# с HIGH и гонит семейства security, quality, spec, verify. Включение spec и verify нужно,
# чтобы эскалация недоделанного на сдаче (дрейф документации spec.check/drift и слом
# контракта API verify/api-break) реально достигала гейта, а не отключалась урезанными
# families (T35).

name = "ailc"

[gate]
# Порог блокировки: находки этой severity и выше блокируют сдачу.
# Допустимые значения: info | low | medium | high | critical.
# Значение «high» совпадает с организационным дефолтом, поэтому политика не слабее.
block_at = "high"

# Семейства проверок, которые гонит гейт. Включают security и quality (безопасность и
# качество), а также spec и verify, без которых эскалация недоделанного недостижима (T35).
families = ["security", "quality", "spec", "verify"]

# Пороги качества: governance как ДАННЫЕ (а не магические числа в коде). Любой можно
# опустить, возьмётся дефолт. Вес = штраф за находку этой severity в итоговом балле.
# Все веса должны быть неотрицательны, все пороги строго положительны: иначе политика
# отвергается с предупреждением и применяется дефолт (T34). Значения ниже совпадают с
# дефолтом, чтобы политика проекта не занижала веса относительно эталона.
[thresholds]
score_critical = 25.0
score_high = 10.0
score_medium = 3.0
score_low = 1.0
score_info = 0.2
max_defs_per_file = 30          # God-файл: больше этого числа определений считается анти-паттерном
max_nesting = 6                 # глубина вложенности выше этой считается анти-паттерном
doc_coverage_floor = 50.0       # ниже этого процента покрытия доками публичное API помечается
max_lines = 400                 # «длинный файл» (строк)
max_complexity = 50             # «сложная функция»
semantic_threshold = 0.62       # порог близости для семантического расширения пайплайна
