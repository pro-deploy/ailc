name: Release

# Собирает релизный бинарь ailc под все платформы и прикрепляет к релизу GitHub:
# Linux (x86_64, aarch64), macOS (Intel и Apple Silicon), Windows (x86_64), плюс
# установочные скрипты install.sh и install.ps1. После сборки бинарников публикует в
# реестр npm обёртку ailc-mcp той же версии (job publish-npm), чтобы GitHub-релиз и npm
# всегда поднимались одним пушем тега. Запускается на теге вида v* или вручную.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,     target: x86_64-apple-darwin }
          - { os: macos-latest,     target: aarch64-apple-darwin }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Сборка release
        run: cargo build --release --target ${{ matrix.target }} -p ailc

      - name: Упаковка (Linux, macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="ailc-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" ailc
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

      - name: Упаковка (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "ailc-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/ailc.exe" -DestinationPath $archive -Force
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii "$archive.sha256"

      - name: Прикрепить к релизу
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            ailc-${{ matrix.target }}.tar.gz
            ailc-${{ matrix.target }}.tar.gz.sha256
            ailc-${{ matrix.target }}.zip
            ailc-${{ matrix.target }}.zip.sha256

  scripts:
    name: установочные скрипты
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Прикрепить установщики к релизу
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            install.sh
            install.ps1

  publish-npm:
    name: публикация обёртки в npm
    # Идёт только по тегу и только после успешной сборки всех бинарников: к моменту
    # публикации ассеты релиза v<версия> уже на месте, поэтому npx ailc-mcp@<версия>
    # сразу найдёт бинарь и не упрётся в 404. Требует секрет репозитория NPM_TOKEN
    # (npm Automation-токен либо гранулярный токен с правом publish и обходом 2FA).
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Сверка версии тега с версией обёртки
        working-directory: npm/ailc-mcp
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::версия тега ($tag) не совпадает с версией обёртки ($pkg)"
            exit 1
          fi
          echo "версия согласована: $pkg"

      - name: Публикация в npm (идемпотентно)
        working-directory: npm/ailc-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pkg="$(node -p "require('./package.json').version")"
          if npm view "ailc-mcp@$pkg" version >/dev/null 2>&1; then
            echo "ailc-mcp@$pkg уже опубликован, пропускаю."
            exit 0
          fi
          npm publish --provenance --access public
